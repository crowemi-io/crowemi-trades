version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/db/schema/app.sql"
    queries:
      - "internal/db/queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc/"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_exported_queries: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        overrides:
          - column: "account.buying_power"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.regt_buying_power"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.daytrading_buying_power"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.effective_buying_power"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.non_marginable_buying_power"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.bod_dtbp"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.cash"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.accrued_fees"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.portfolio_value"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.multiplier"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.equity"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.last_equity"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.long_market_value"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.short_market_value"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.position_market_value"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.initial_margin"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.maintenance_margin"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.last_maintenance_margin"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "account.sma"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "activity.price"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "activity.qty"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "activity.leaves_qty"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "activity.cum_qty"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "activity.net_amount"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "activity.per_share_amount"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "portfolio.weight"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "portfolio_symbol.weight"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "position.quantity"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "position.avg_entry_price"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "position.market_value"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "position.unrealized_pl"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "order.quantity"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "order.notional"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "order.filled_qty"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "order.filled_avg_price"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "order.limit_price"
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "order.stop_price"
            go_type: "github.com/shopspring/decimal.Decimal"
